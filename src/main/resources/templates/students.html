<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sinh viên</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #e6ffe6);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #e91e63; /* hồng đậm */
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #8bc34a; /* xanh lá chuối */
            color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tr {
            border-bottom: 1px solid #dddddd;
        }

        tbody tr:nth-child(even) {
            background-color: #f9fff5;
        }

        tbody tr:hover {
            background-color: #ffe6f0;
            transition: 0.3s;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> DANH SÁCH SINH VIÊN </h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.email}"></td>
            </tr>
        </tbody>
    </table>

    <footer>
        Họ và tên: Nguyễn Tạ Thảo Kiên | IDSV: 104752 | Lớp: ST23C | Gmail: kien104752@gmail.com
    </footer>
</div>

</body>
</html>
