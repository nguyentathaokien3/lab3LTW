<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e0f2fe, #f8fafc);
        margin: 0;
    }

    .container {
        width: 90%;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
        letter-spacing: 1px;
    }

    .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 15px;
    }

    .btn-add {
        padding: 10px 15px;
        background: #22c55e;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-add:hover {
        background: #16a34a;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th {
        background: #2563eb;
        color: white;
        padding: 12px;
    }

    td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    tr:hover {
        background: #f1f5f9;
        transition: 0.2s;
    }

    .btn {
        padding: 6px 10px;
        border-radius: 6px;
        color: white;
        text-decoration: none;
        font-size: 13px;
        margin: 0 3px;
        display: inline-block;
    }

    .edit {
        background: #f59e0b;
    }

    .edit:hover {
        background: #d97706;
    }

    .delete {
        background: #ef4444;
    }

    .delete:hover {
        background: #dc2626;
    }
</style>

<div class="container">

    <h2>📚 DANH SÁCH SINH VIÊN</h2>

    <div class="top-bar">
        <a class="btn-add" href="/students/add">+ Thêm sinh viên</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Email</th>
            <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="s : ${students}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.email}"></td>

            <td>
                <a class="btn edit" th:href="@{'/students/edit/' + ${s.id}}">Sửa</a>
                <a class="btn delete"
                   th:href="@{'/students/delete/' + ${s.id}}"
                   onclick="return confirm('Bạn có chắc muốn xóa không?')">
                    Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
