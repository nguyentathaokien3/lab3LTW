<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form sinh viên</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #e6ffe6, #ffe6f0);
        }

        .box {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            border: none;
            color: white;
            background: #4CAF50;
            border-radius: 5px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center;">Form sinh viên</h2>

    <form th:action="@{/students/save}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <input type="text" th:field="*{name}" placeholder="Tên sinh viên" required/>

        <input type="email" th:field="*{email}" placeholder="Email" required/>

        <button type="submit">Lưu</button>
    </form>

    <a href="/students">← Quay lại</a>
</div>

</body>
</html>
